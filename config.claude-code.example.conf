# Claude Code 示例配置
# 精简起步版，字段与 config.example.conf 一致。
# 复制为 config.conf 后，只需先改 UPSTREAM_URL。
# Claude Code 规则：
# - Opus / Sonnet 主会话会保活
# - 标题请求自动排除
# - 子代理请求自动排除
# - Haiku 主会话只记录，不保活

UPSTREAM_URL=https://your-upstream.example.com
PORT=8899

KEEPALIVE_SECONDS=270
EXPIRE_SECONDS=1200
RETRY_DELAY_SECONDS=10
KEEPALIVE_EXCLUDE=h:

ALERT_WEBHOOK_URL=
ALERT_CHAT_ID=

# 调试开关，日常使用保持关闭
INSPECT_REQUESTS=0
INSPECT_MAX_ENTRIES=30
FULL_CAPTURE_REQUESTS=0
FULL_CAPTURE_MAX_ENTRIES=10

# 仅兼容旧配置
# KEEPALIVE_MS=270000
# EXPIRE_MS=1200000
# RETRY_DELAY_MS=10000

COST_CACHE_WRITE_PER_MTOK=0
COST_CACHE_READ_PER_MTOK=0
