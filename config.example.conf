# OpenClaw Cache Keepalive Proxy - Configuration
# Copy this file to config.conf and edit as needed.
#
# Hot-reloadable fields: edit config.conf and changes take effect immediately.
# Startup-only fields: require service restart to take effect.

# ============================================================
# REQUIRED — Your Anthropic API upstream URL
# ============================================================
# This is the URL your OpenClaw currently sends Anthropic API requests to.
# Examples:
#   Direct Anthropic:  https://api.anthropic.com
#   Third-party relay:  https://your-relay.example.com
#
# ⚠️ Requires restart to change.
UPSTREAM_URL=

# ============================================================
# Proxy port (default: 8899)
# ============================================================
# The local port this proxy listens on.
# After installation, point your OpenClaw Anthropic base URL to:
#   http://127.0.0.1:8899
#
# ⚠️ Requires restart to change.
PORT=8899

# ============================================================
# Keepalive interval (default: 270000 = 4m30s)
# ============================================================
# How often to send keepalive requests per session.
# Must be less than Anthropic's 5-minute cache TTL.
# Recommended: 270000 (4m30s) — leaves 30s safety margin.
#
# ✅ Hot-reloadable.
KEEPALIVE_MS=270000

# ============================================================
# Session expiry (default: 1200000 = 20m)
# ============================================================
# Stop keepalive after this much inactivity.
# Sessions with no real requests for this duration are cleaned up.
#
# ✅ Hot-reloadable.
EXPIRE_MS=1200000

# ============================================================
# Retry delay on failure (default: 10000 = 10s)
# ============================================================
# On keepalive failure (network/HTTP error), wait this long before retrying once.
# Cache misses (cache_write > 0) are NOT retried — cache is already rebuilt.
#
# ✅ Hot-reloadable.
RETRY_DELAY_MS=10000

# ============================================================
# Exclude sessions from keepalive
# ============================================================
# Comma-separated prefixes. Sessions whose ID starts with any prefix are excluded.
# Default: "h:" excludes hash-fallback sessions (heartbeat, cron, etc.)
#
# ✅ Hot-reloadable.
KEEPALIVE_EXCLUDE=h:

# ============================================================
# Alerting — Option A: Generic Webhook (recommended for non-Feishu users)
# ============================================================
# POST JSON payload to this URL on cache miss or keepalive failure.
# Works with Slack, Discord, Telegram bots, or any webhook receiver.
# Payload: { "sid": "...", "type": "...", "detail": "...", "timestamp": "..." }
#
# Leave empty to skip webhook alerts.
# ✅ Hot-reloadable.
ALERT_WEBHOOK_URL=

# ============================================================
# Alerting — Option B: Feishu / Lark (auto-detected for OpenClaw+Feishu users)
# ============================================================
# If you use OpenClaw with Feishu, credentials are auto-detected from
# ~/.openclaw/openclaw.json. Just fill in the chat_id to receive alerts.
#
# To find your chat_id: open a Feishu group → Settings → Group ID (oc_xxx).
# For DM alerts, use your open_id (ou_xxx) — but chat_id is recommended.
#
# Leave empty to skip Feishu alerts.
# ✅ Hot-reloadable.
ALERT_CHAT_ID=
