# OpenClaw / Claude Code Cache Keepalive Proxy 配置
# 复制为 config.conf 后按需修改。
#
# 热加载项：修改后下一轮调度生效。
# 启动项：修改后需要重启进程。
#
# 当前支持：
# - OpenClaw：按 chat_id 保活
# - Claude Code：按 metadata.user_id.session_id 保活
#   - Opus / Sonnet 主会话保活
#   - 标题请求自动排除
#   - 子代理请求自动排除
#   - Haiku 主会话只记录，不保活

# ============================================================
# 必填：上游 Anthropic 兼容地址
# ============================================================
# 这里填你客户端当前使用的上游地址。
# 示例：
#   官方直连： https://api.anthropic.com
#   中转地址： https://your-relay.example.com
# ⚠️ 修改后需要重启。
UPSTREAM_URL=

# ============================================================
# 本地监听端口（默认 8899）
# ============================================================
# 启动后，把 OpenClaw / Claude Code 指向：
#   http://127.0.0.1:8899
# ⚠️ 修改后需要重启。
PORT=8899

# ============================================================
# 保活间隔（默认 270 秒 = 4 分 30 秒）
# ============================================================
# 每个会话多久发一次 keepalive。
# 必须小于 Anthropic 5 分钟缓存 TTL。
# 建议保持 270，留 30 秒安全边际。
# ✅ 热加载。
KEEPALIVE_SECONDS=270

# ============================================================
# 会话过期时间（默认 1200 秒 = 20 分钟）
# ============================================================
# 真实请求静默达到这个时长后，停止保活并清理会话。
# ✅ 热加载。
EXPIRE_SECONDS=1200

# ============================================================
# 失败重试延迟（默认 10 秒）
# ============================================================
# keepalive 因网络或 HTTP 失败时，延迟多久后重试一次。
# cache miss（cache_write > 0）不会重试，因为缓存已经重建。
# ✅ 热加载。
RETRY_DELAY_SECONDS=10

# ============================================================
# 按前缀排除会话
# ============================================================
# 逗号分隔的前缀列表，命中的 session 不会保活。
# 默认值 "h:" 用于排除 hash fallback 会话。
# Claude Code 的 Haiku / 标题 / 子代理请求会自动排除，不必手动写。
# ✅ 热加载。
KEEPALIVE_EXCLUDE=h:

# ============================================================
# 告警方式 A：通用 Webhook
# ============================================================
# 发生 cache miss 或 keepalive 失败时，向这个地址 POST JSON。
# 适用于 Slack、Discord、Telegram Bot 或任意 webhook 接收端。
# 留空表示关闭。
# ✅ 热加载。
ALERT_WEBHOOK_URL=

# ============================================================
# 告警方式 B：飞书 / Lark
# ============================================================
# OpenClaw + 飞书场景下，凭证会自动从 ~/.openclaw/openclaw.json 读取。
# 这里只需要填写 chat_id。
# 仅支持 chat_id（oc_xxx），不支持 open_id（ou_xxx）。
# 留空表示关闭。
# ✅ 热加载。
ALERT_CHAT_ID=

# ============================================================
# Inspect：安全摘要调试
# ============================================================
# 记录请求结构摘要，不落完整鉴权值和完整正文。
# 输出到 /inspect 和 .inspect.jsonl。
# 只建议短期开启排障。
# ✅ 热加载。
INSPECT_REQUESTS=0
INSPECT_MAX_ENTRIES=30

# ============================================================
# Capture：完整请求抓取（高风险）
# ============================================================
# 记录完整请求头和正文。
# 鉴权头会脱敏，但正文仍会落盘。
# 输出到 /capture 和 .capture.jsonl。
# 只建议短期开启，排障后立即删除文件。
# ✅ 热加载。
FULL_CAPTURE_REQUESTS=0
FULL_CAPTURE_MAX_ENTRIES=10

# 仅兼容旧配置，新配置统一使用 *_SECONDS。
# KEEPALIVE_MS=270000
# EXPIRE_MS=1200000
# RETRY_DELAY_MS=10000

# ============================================================
# 费用估算（可选）
# ============================================================
# 填写后，/status 会显示 estimated savings。
# 单位是 USD / 百万 tokens，建议填你的实际价格。
# 官方价格请以 https://docs.anthropic.com 为准。
#   Opus:   cache_write = 18.75, cache_read = 1.50
#   Sonnet: cache_write = 3.75,  cache_read = 0.30
#   Haiku:  cache_write = 1.00,  cache_read = 0.08
# 留空或填 0 表示关闭估算。
# ✅ 热加载。
COST_CACHE_WRITE_PER_MTOK=0
COST_CACHE_READ_PER_MTOK=0
